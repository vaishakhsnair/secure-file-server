services:
  secure-file-server:
    build:
      context: .
    container_name: secure-file-server
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      STORAGE_DIR: /srv/data
      UPLOAD_ENABLED: ${UPLOAD_ENABLED:-false}
      UPLOAD_USERNAME: ${UPLOAD_USERNAME:-uploader}
      UPLOAD_PASSWORD: ${UPLOAD_PASSWORD:-change-me}
      GUI_USERNAME: ${GUI_USERNAME:-uploader}
      GUI_PASSWORD: ${GUI_PASSWORD:-change-me}
      GUI_SESSION_SECRET: ${GUI_SESSION_SECRET:-replace-this-with-a-long-secret}
      GUI_COOKIE_SECURE: ${GUI_COOKIE_SECURE:-false}
      GUI_SESSION_TTL_SECONDS: ${GUI_SESSION_TTL_SECONDS:-28800}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      ALLOW_OVERWRITE: ${ALLOW_OVERWRITE:-false}
    volumes:
      - ./data:/srv/data:rw
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
